---
info:
    app:
        name: '@info.app.name@'
        version: '@info.app.version@'
        grailsVersion: '@info.app.grailsVersion@'
grails:
    codegen:
        defaultPackage: re
    profile: web

---
grails:
    mime:
        types:
            all: '*/*'
            atom: application/atom+xml
            css: text/css
            csv: text/csv
            form: application/x-www-form-urlencoded
            html:
              - text/html
              - application/xhtml+xml
            js: text/javascript
            json:
              - application/json
              - text/json
            multipartForm: multipart/form-data
            pdf: application/pdf
            rss: application/rss+xml
            text: text/plain
            hal:
              - application/hal+json
              - application/hal+xml
            xml:
              - text/xml
              - application/xml
    views:
        gsp:
            encoding: UTF-8
            htmlcodec: xml
            codecs:
                scriptlet: html


---

environments:
   development:
    grails:
       
      mongodb:
        host: "localhost"
        port: 27017
        username: ""
        password: ""
        databaseName: "re"
  
   production:
     grails:
       mongodb:
              host: "localhost"
              port: 27017
              username: ""
              password: ""
              databaseName: "re"
  